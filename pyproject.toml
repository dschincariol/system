[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "trading-system"
version = "0.0.0"
requires-python = ">=3.11"
dependencies = [
  "scikit-learn>=1.5.2",
]

[project.optional-dependencies]
cpu-runtime = [
  "torch==2.4.1+cpu",
]
nvidia-cuda = [
  "torch==2.4.1+cu121",
  "nvidia-ml-py==13.595.45",
  "pynvml==13.0.1",
]
amd-rocm = []
ts-foundation = [
  "chronos-forecasting>=2.1.0",
  "pandas>=2.2",
]

[tool.setuptools]
py-modules = []

[tool.setuptools.packages.find]
include = ["engine*", "routes*", "services*"]
