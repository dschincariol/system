openapi: 3.1.0
info:
  title: Trading System HTTP API
  version: 0.1.0
  summary: Grounded OpenAPI baseline for the Python dashboard server surface.
  description: |
    This specification documents the current high-value HTTP paths assembled by
    `dashboard_server.py` from `engine/api/`, `engine/terminal/api/`, and
    `routes/data_sources_routes.py`.

    It is intentionally incomplete. The broader `/api/*` surface, fallback
    routes defined directly in `dashboard_server.py`, and the separate Node
    operator server in `boot/operator_server.js` still need additional
    incremental coverage.
servers:
  - url: http://127.0.0.1:8000
    description: Local dashboard server. Actual bind host and port come from `DASHBOARD_HOST` and `DASHBOARD_PORT`.
tags:
  - name: system
  - name: operator
  - name: jobs
  - name: data-sources
  - name: broker-config
  - name: execution
  - name: governance
  - name: terminal
components:
  securitySchemes:
    DashboardApiToken:
      type: apiKey
      in: header
      name: X-API-Token
      description: |
        Protected dashboard API routes accept the token in the `X-API-Token`
        header. Sensitive GET routes require this header in production/live or
        remote-bind deployments. Query-string `token` authentication is legacy
        local-development compatibility only and is rejected for protected
        routes in production/live.
  schemas:
    FreeformObject:
      type: object
      additionalProperties: true
    ErrorEnvelope:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: string
      additionalProperties: true
    HealthResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        status:
          type: string
        error:
          type: string
        reasons:
          type: array
          items:
            type: string
        ts_ms:
          type: integer
      additionalProperties: true
    ExecutionBarrier:
      type: object
      required:
        - ok
        - mode
        - allow_execution
        - allow_execution_pipeline
        - allow_simulation
        - real_trading_allowed
        - allowed
        - reason
        - runtime_state
      properties:
        ok:
          type: boolean
        ts_ms:
          type: integer
        mode:
          type: string
        armed:
          type:
            - integer
            - "null"
        allow_execution:
          type: boolean
        allow_execution_pipeline:
          type: boolean
        allow_simulation:
          type: boolean
        real_trading_allowed:
          type: boolean
        allowed:
          type: boolean
        reason:
          type: string
        runtime_state:
          type: string
        severity:
          type: string
      additionalProperties: true
    ExecutionDiagnosticsResponse:
      type: object
      required:
        - ok
        - ts_ms
        - state
        - inventory
        - tca
        - order_flow
        - lob
        - learned_slicing
        - drilldowns
      description: |
        Read-only operator execution diagnostics. The payload aggregates
        existing execution stats, TCA, order-flow outcomes, LOB/DeepLOB
        readiness, and bounded learned-slicing audit evidence. It does not
        grant execution authority; live actions remain governed by broker,
        risk, and execution-barrier controls.
      properties:
        ok:
          type: boolean
        ts_ms:
          type: integer
        state:
          type: string
          enum: [fresh, available, stale, partial, unavailable]
        symbol:
          type:
            - string
            - "null"
        inventory:
          type: object
          required: [routes, summary]
          properties:
            routes:
              type: array
              items:
                type: object
                required: [route, state, payload, description]
                properties:
                  route:
                    type: string
                  state:
                    type: string
                    enum: [fresh, available, stale, unavailable]
                  payload:
                    type: string
                  description:
                    type: string
                  table:
                    type: string
                  rows:
                    type: integer
                  latest_ts_ms:
                    type: integer
                  age_ms:
                    type: integer
                  reason:
                    type: string
                additionalProperties: true
            summary:
              type: object
              additionalProperties: true
          additionalProperties: true
        tca:
          type: object
          required: [state, by_symbol, rolling, partial_fills]
          properties:
            state:
              type: string
            reason:
              type: string
            latest_fill_ts_ms:
              type:
                - integer
                - "null"
            latest_fill_age_ms:
              type:
                - integer
                - "null"
            by_symbol:
              type: array
              items:
                $ref: '#/components/schemas/FreeformObject'
            rolling:
              type: array
              items:
                $ref: '#/components/schemas/FreeformObject'
            partial_fills:
              type: array
              items:
                $ref: '#/components/schemas/FreeformObject'
            recent_fills:
              type: array
              items:
                $ref: '#/components/schemas/FreeformObject'
          additionalProperties: true
        order_flow:
          type: object
          required: [state, partial_fills, rejected_intents, suppressed_intents]
          properties:
            state:
              type: string
            partial_fills:
              type: array
              items:
                $ref: '#/components/schemas/FreeformObject'
            rejected_intents:
              type: array
              items:
                $ref: '#/components/schemas/FreeformObject'
            suppressed_intents:
              type: array
              items:
                $ref: '#/components/schemas/FreeformObject'
            outcome_counts:
              type: object
              additionalProperties: true
          additionalProperties: true
        lob:
          type: object
          required: [state, l2_feed, simulation, deeplob, warnings]
          properties:
            state:
              type: string
            l2_feed:
              $ref: '#/components/schemas/FreeformObject'
            simulation:
              $ref: '#/components/schemas/FreeformObject'
            latency:
              $ref: '#/components/schemas/FreeformObject'
            deeplob:
              $ref: '#/components/schemas/FreeformObject'
            warnings:
              type: array
              items:
                type: string
          additionalProperties: true
        learned_slicing:
          type: object
          required: [state, reason, policy, authority]
          properties:
            state:
              type: string
            reason:
              type: string
            policy:
              $ref: '#/components/schemas/FreeformObject'
            authority:
              type: object
              properties:
                live_authority_granted:
                  type: boolean
                execution_parameters_only:
                  type: boolean
              additionalProperties: true
            exploration:
              $ref: '#/components/schemas/FreeformObject'
            shadow:
              $ref: '#/components/schemas/FreeformObject'
            selected_action_distribution:
              type: array
              items:
                $ref: '#/components/schemas/FreeformObject'
            baseline_comparison:
              $ref: '#/components/schemas/FreeformObject'
            recent_suppression_reasons:
              type: array
              items:
                $ref: '#/components/schemas/FreeformObject'
            recent_decisions:
              type: array
              items:
                $ref: '#/components/schemas/FreeformObject'
          additionalProperties: true
        drilldowns:
          type: array
          items:
            type: object
            required: [kind, intent, route, fill, outcome]
            properties:
              kind:
                type: string
              symbol:
                type:
                  - string
                  - "null"
              client_order_id:
                type:
                  - string
                  - "null"
              portfolio_orders_id:
                type:
                  - integer
                  - "null"
              source_alert_id:
                type:
                  - integer
                  - "null"
              intent:
                type: string
              route:
                type: string
              fill:
                type: string
              outcome:
                type: string
              reason_code:
                type: string
              reason:
                type: string
              ts_ms:
                type:
                  - integer
                  - "null"
            additionalProperties: true
      additionalProperties: true
    SystemSnapshot:
      type: object
      required:
        - ok
        - status
        - state
        - mode
        - execution_mode
        - execution_barrier
      properties:
        ok:
          type: boolean
        status:
          type: string
        state:
          type: string
        mode:
          type: string
        execution_mode:
          type: string
        execution_allowed:
          type: boolean
        reasons:
          type: array
          items:
            type: string
        ts_ms:
          type: integer
        health:
          $ref: '#/components/schemas/FreeformObject'
        ingestion:
          $ref: '#/components/schemas/FreeformObject'
        services:
          $ref: '#/components/schemas/FreeformObject'
        readiness:
          $ref: '#/components/schemas/FreeformObject'
        execution_barrier:
          $ref: '#/components/schemas/ExecutionBarrier'
      additionalProperties: true
    ReadinessEvidenceItem:
      type: object
      required:
        - id
        - title
        - status
        - severity
        - blocking
        - source_subsystem
        - freshness
        - detail
        - remediation
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [passing, warning, blocked, unavailable]
        severity:
          type: string
          enum: [info, warning, critical]
        blocking:
          type: boolean
        source_subsystem:
          type: string
        source_route:
          type: string
        source_config_key:
          type: string
        freshness:
          type: object
          properties:
            last_update_ts_ms:
              type: integer
            age_ms:
              type:
                - integer
                - "null"
            max_age_ms:
              type:
                - integer
                - "null"
            stale:
              type: boolean
            label:
              type: string
          additionalProperties: true
        detail:
          type: string
        remediation:
          type: string
        category:
          type: string
      additionalProperties: true
    ReadinessEvidenceResponse:
      type: object
      required: [ok, status, mode, execution_mode, ts_ms, items]
      properties:
        ok:
          type: boolean
        status:
          type: string
          enum: [passing, warning, blocked, unavailable]
        mode:
          type: string
        execution_mode:
          type: string
        critical_context:
          type: boolean
        ts_ms:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReadinessEvidenceItem'
        blockers:
          type: array
          items:
            $ref: '#/components/schemas/ReadinessEvidenceItem'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/ReadinessEvidenceItem'
        unavailable:
          type: array
          items:
            $ref: '#/components/schemas/ReadinessEvidenceItem'
        action_guards:
          $ref: '#/components/schemas/FreeformObject'
      additionalProperties: true
    TerminalOrderRequest:
      type: object
      required: [symbol, side, qty]
      description: |
        Browser-terminal manual quantity order request. A successful request is
        persisted as a `portfolio_orders` row with neutral weight fields:
        `from_weight = 0.0`, `to_weight = 0.0`, and `delta_weight = 0.0`.
        Quantity is stored in `explain_json.terminal_order`, where `qty` is
        positive and `signed_qty` is derived from `side` (`BUY` positive,
        `SELL` negative).
      properties:
        symbol:
          type: string
        side:
          type: string
          enum: [BUY, SELL]
        qty:
          type: number
          exclusiveMinimum: 0
          description: Positive share/unit quantity requested by the operator.
      additionalProperties: true
    TerminalOrderResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        symbol:
          type: string
        side:
          type: string
          enum: [BUY, SELL]
        qty:
          type: number
        error:
          type: string
        gate:
          $ref: '#/components/schemas/ExecutionBarrier'
      additionalProperties: true
    TerminalFlattenRequest:
      type: object
      required: [symbol]
      description: |
        Browser-terminal flatten request. The server reads the current broker
        position, derives side and absolute quantity, and persists the same
        neutral-weight terminal quantity encoding used by manual orders with
        `explain_json.terminal_order.flatten = true`.
      properties:
        symbol:
          type: string
      additionalProperties: true
    TerminalFlattenResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        symbol:
          type: string
        flatten_qty:
          type: number
        message:
          type: string
        error:
          type: string
        gate:
          $ref: '#/components/schemas/ExecutionBarrier'
      additionalProperties: true
    BrokerConfigResponse:
      type: object
      required: [ok, ts_ms, config]
      properties:
        ok:
          type: boolean
        ts_ms:
          type: integer
        config:
          type: object
          additionalProperties: true
          properties:
            active_broker:
              type: string
            paper_live_mode:
              type: string
            active:
              type: boolean
            disabled:
              type: boolean
            failover_order:
              type: array
              items:
                type: string
            credentials_configured:
              type: boolean
            masked_credentials:
              type: object
              additionalProperties: true
            credential_age:
              type: object
              additionalProperties: true
            last_test_result:
              type: object
              additionalProperties: true
            secrets_masked:
              type: boolean
      additionalProperties: true
    BrokerConfigMutationRequest:
      type: object
      description: |
        Broker configuration update. Optional `credentials` are encrypted before
        storage and are never returned in clear text. Activating a non-`sim`
        broker requires a prior passing `/api/broker/test_connection` result for
        the same broker.
      properties:
        actor:
          type: string
        active_broker:
          type: string
        paper_live_mode:
          type: string
        active:
          type: boolean
        disabled:
          type: boolean
        failover_order:
          type: array
          items:
            type: string
        base_url:
          type: string
        host:
          type: string
        port:
          type: string
        client_id:
          type: string
        timeout_s:
          type: number
        retry_policy:
          type: object
          additionalProperties: true
        credentials:
          type: object
          additionalProperties: true
      additionalProperties: true
    BrokerTestResponse:
      type: object
      required: [ok, broker, state, latency_ms, reasons, tested_ts_ms]
      properties:
        ok:
          type: boolean
        broker:
          type: string
        state:
          type: string
          enum: [passed, failed]
        latency_ms:
          type: number
        reasons:
          type: array
          items:
            type: string
        tested_ts_ms:
          type: integer
      additionalProperties: true
    GovernanceEvidenceRow:
      type: object
      required:
        - key
        - label
        - state
        - freshness
        - sample_count
        - last_update_ts_ms
        - source_artifact
        - remediation
        - details
      properties:
        key:
          type: string
        label:
          type: string
        state:
          type: string
          enum: [pass, block, unknown]
        freshness:
          type: string
          enum: [fresh, stale, missing, unknown]
        sample_count:
          type: integer
        last_update_ts_ms:
          type: integer
        source_artifact:
          type: string
        remediation:
          type: string
        details:
          $ref: '#/components/schemas/FreeformObject'
      additionalProperties: true
    GovernanceEvidenceResponse:
      type: object
      required: [ok, ts_ms, state, authority, evidence, blockers, unknowns]
      properties:
        ok:
          type: boolean
        ts_ms:
          type: integer
        state:
          type: string
          enum: [pass, block, unknown]
        authority:
          $ref: '#/components/schemas/FreeformObject'
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/GovernanceEvidenceRow'
        blockers:
          type: array
          items:
            $ref: '#/components/schemas/GovernanceEvidenceRow'
        unknowns:
          type: array
          items:
            $ref: '#/components/schemas/GovernanceEvidenceRow'
      additionalProperties: true
    ShadowCapitalScoresResponse:
      type: object
      required: [ok, regime, rows, masking, authority]
      properties:
        ok:
          type: boolean
        regime:
          type: string
        rows:
          type: array
          items:
            $ref: '#/components/schemas/FreeformObject'
        masking:
          $ref: '#/components/schemas/FreeformObject'
        evidence:
          oneOf:
            - $ref: '#/components/schemas/GovernanceEvidenceRow'
            - type: "null"
        authority:
          type: string
      additionalProperties: true
    FeatureVisibilityResponse:
      type: object
      required: [ok, ts_ms, structured_documents, graph_features, meta]
      description: |
        Read-only operator visibility for structured-document extraction rows
        and graph-relational snapshots. Shadow-only fields are labeled in the
        payload and do not grant trading, promotion, or allocation authority.
      properties:
        ok:
          type: boolean
        ts_ms:
          type: integer
        structured_documents:
          $ref: '#/components/schemas/FreeformObject'
        graph_features:
          $ref: '#/components/schemas/FreeformObject'
        explanation_paths:
          $ref: '#/components/schemas/FreeformObject'
        meta:
          $ref: '#/components/schemas/FreeformObject'
      additionalProperties: true
paths:
  /api/health:
    get:
      tags: [system]
      summary: Return the cached system health snapshot.
      operationId: getHealth
      responses:
        '200':
          description: Health payload from `engine.api.api_system.api_get_health`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/operator/health:
    get:
      tags: [operator]
      summary: Alias for `/api/health` used by operator-side clients.
      operationId: getOperatorHealth
      responses:
        '200':
          description: Same payload shape as `/api/health`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/system/state:
    get:
      tags: [system]
      summary: Return the aggregated system state snapshot.
      operationId: getSystemState
      responses:
        '200':
          description: Runtime state assembled by `engine.api.api_system.api_get_system_state`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSnapshot'
  /api/system/config:
    get:
      tags: [system]
      summary: Return redacted runtime configuration and system state.
      operationId: getSystemConfig
      description: |
        Sensitive GET. In production/live or remote-bind deployments the
        transport requires `X-API-Token`, applies rate limiting and audit
        logging, rejects query-string tokens in production/live, and redacts
        DSNs, tokens, passwords, API keys, Authorization headers, and broker or
        account identifiers in the response.
      security:
        - DashboardApiToken: []
      responses:
        '200':
          description: Redacted runtime configuration payload from `api_get_runtime_config`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSnapshot'
        '401':
          description: Missing, invalid, or disallowed query-string token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/readiness:
    get:
      tags: [system]
      summary: Return the condensed readiness view.
      operationId: getReadiness
      responses:
        '200':
          description: Readiness payload derived from health, graph validation, and execution state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSnapshot'
  /api/data/feature_visibility:
    get:
      tags: [system]
      summary: Return structured-document and graph-feature health visibility.
      operationId: getDataFeatureVisibility
      description: |
        Sensitive GET. Returns counts, freshness, confidence buckets, source
        lineage, symbol and event coverage, graph snapshot freshness, graph
        feature availability, shadow-only labels, and PIT status for optional
        structured-document and graph-relational feature groups. This route is
        explanatory only; server-side feature registry, model serving,
        promotion, and execution gates remain authoritative.
      security:
        - DashboardApiToken: []
      parameters:
        - name: symbol
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: low_confidence_threshold
          in: query
          required: false
          schema:
            type: number
      responses:
        '200':
          description: Feature visibility payload for dashboard Data Health and decision-drilldown enrichment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureVisibilityResponse'
  /api/operator/readiness_evidence:
    get:
      tags: [operator]
      summary: Return normalized live/paper readiness evidence and guarded-action hints.
      operationId: getOperatorReadinessEvidence
      description: |
        Sensitive GET. Aggregates readiness/preflight evidence from runtime
        health, execution barrier, kill switches, broker config/test state,
        live trading preflight, provider telemetry, data-source health,
        governance OPE/experiment-ledger controls, production monitoring, and
        health/liveness/readiness probes. Missing or stale critical evidence in
        live/paper context is returned as `blocked` or `unavailable`, never as a
        passing state. Aliases are `/api/readiness/evidence` and
        `/api/system/readiness_evidence`.
      security:
        - DashboardApiToken: []
      parameters:
        - name: mode
          in: query
          required: false
          schema:
            type: string
        - name: execution_mode
          in: query
          required: false
          schema:
            type: string
        - name: broker
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Normalized readiness evidence items grouped by owning subsystem.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessEvidenceResponse'
  /api/governance/evidence:
    get:
      tags: [governance]
      summary: Return read-only governance evidence for promotion and generated-candidate trust decisions.
      operationId: getGovernanceEvidence
      description: |
        Sensitive GET. Aggregates persisted OPE, experiment-ledger,
        net-after-cost label, learned-alpha, alpha-shrinkage, production
        monitoring, shadow-live, and shadow-capital evidence. The route is
        explanatory only and does not authorize promotion or allocation.
      security:
        - DashboardApiToken: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 500
        - name: regime
          in: query
          required: false
          schema:
            type: string
            default: global
      responses:
        '200':
          description: Governance evidence summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceEvidenceResponse'
  /api/governance/evidence/promotion_blockers:
    get:
      tags: [governance]
      summary: Return exact promotion guard and evidence blockers.
      operationId: getGovernanceEvidencePromotionBlockers
      security:
        - DashboardApiToken: []
      responses:
        '200':
          description: Promotion blocker drilldown.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
  /api/governance/evidence/generated_candidates:
    get:
      tags: [governance]
      summary: Return generated-candidate experiment-ledger provenance and blockers.
      operationId: getGovernanceEvidenceGeneratedCandidates
      security:
        - DashboardApiToken: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Generated-candidate provenance rows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
  /api/governance/evidence/shadow_capital:
    get:
      tags: [governance]
      summary: Return masked shadow-capital score evidence.
      operationId: getGovernanceEvidenceShadowCapital
      security:
        - DashboardApiToken: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 500
        - name: regime
          in: query
          required: false
          schema:
            type: string
            default: global
      responses:
        '200':
          description: Shadow-capital score evidence.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShadowCapitalScoresResponse'
  /api/governance/shadow_capital/scores:
    get:
      tags: [governance]
      summary: Return first-class masked shadow-capital score rows.
      operationId: getGovernanceShadowCapitalScores
      security:
        - DashboardApiToken: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 500
        - name: regime
          in: query
          required: false
          schema:
            type: string
            default: global
      responses:
        '200':
          description: Shadow-capital score rows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShadowCapitalScoresResponse'
  /api/execution/barrier:
    get:
      tags: [system]
      summary: Return the current execution barrier and selected block reason.
      operationId: getExecutionBarrier
      responses:
        '200':
          description: Execution barrier snapshot extracted from the broader system snapshot.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SystemSnapshot'
                  - type: object
