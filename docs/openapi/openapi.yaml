      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FreeformObject'
      responses:
        '200':
          description: Provider-account update result plus lifecycle reconciliation summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
        '403':
