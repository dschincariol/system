name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Python dependencies (including pytest)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Windows dev extras
        if: matrix.os == 'windows-latest'
        run: python -m pip install -e ".[windows-dev]"

      - name: Install Node dependencies
        run: npm ci

      - name: Run cross-platform contract tests
        env:
          PYTHONPATH: .
        # These tests do not need a running Postgres or Redis. They
        # enforce the Windows-dev / Linux-prod application-code
        # contract on both platforms. Suite tests that require
        # Postgres / Redis are auto-skipped via the requires_postgres
        # / requires_redis markers in tests/conftest.py.
        run: |
          python -m pytest -q \
            tests/test_no_sqlite_in_runtime.py \
            tests/test_no_string_paths.py \
            tests/test_no_loose_blob_writes.py \
            tests/test_no_legacy_secret_paths.py \
            tests/test_platform_defaults.py \
            tests/test_audit_canonical.py \
            tests/test_audit_hashing.py \
            tests/test_secrets_loader.py \
            tests/test_secrets_provider_plaintext.py \
            tests/test_secrets_provider_dpapi.py \
            tests/test_secrets_provider_systemd.py
        shell: bash

      - name: Run canonical repository validation
        if: matrix.os == 'ubuntu-latest'
        env:
          PYTHONPATH: .
        run: python tools/validate_repo.py
