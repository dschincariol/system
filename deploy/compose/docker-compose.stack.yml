x-trading-logging: &trading-logging
  driver: "${DOCKER_LOG_DRIVER:-local}"
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-50m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-5}"

services:
  runtime:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile.runtime
      args:
        PYTHON_RUNTIME_IMAGE: ${PYTHON_RUNTIME_IMAGE:?set PYTHON_RUNTIME_IMAGE}
        TRADING_DEPENDENCY_PROFILE: ${TRADING_DEPENDENCY_PROFILE:-cpu}
    image: ${APP_RUNTIME_IMAGE:?set APP_RUNTIME_IMAGE}
    container_name: trading-runtime
    restart: unless-stopped
    cpus: ${RUNTIME_CPUS:-12}
    mem_limit: ${RUNTIME_MEM_LIMIT:-48g}
    memswap_limit: ${RUNTIME_MEMSWAP_LIMIT:-48g}
    shm_size: ${RUNTIME_SHM_SIZE:-8g}
    logging: *trading-logging
    environment:
      ENV: ${APP_ENV:-prod}
      ENGINE_SUPERVISED: "1"
      ENGINE_MODE: ${ENGINE_MODE:-safe}
      EXECUTION_MODE: ${EXECUTION_MODE:-safe}
      OPERATOR_MODE: ${OPERATOR_MODE:-safe}
      RUNTIME_WORKLOAD_PROFILE: ${RUNTIME_WORKLOAD_PROFILE:-live}
      PROD_LOCK: ${PROD_LOCK:-1}
      ALLOW_TRAINING: ${ALLOW_TRAINING:-0}
      OFFLINE_TRAINING_LIVE_PROFILE_ACK: ${OFFLINE_TRAINING_LIVE_PROFILE_ACK:-}
      OFFLINE_TRAINING_LIVE_PROFILE_OWNER: ${OFFLINE_TRAINING_LIVE_PROFILE_OWNER:-}
      OFFLINE_TRAINING_LIVE_PROFILE_REASON: ${OFFLINE_TRAINING_LIVE_PROFILE_REASON:-}
      PREFLIGHT_CHECK_RESOURCE_LIMITS: ${PREFLIGHT_CHECK_RESOURCE_LIMITS:-1}
      TRADING_RESOURCE_HOST_CPUS: ${TRADING_RESOURCE_HOST_CPUS:-32}
      TRADING_RESOURCE_HOST_MEMORY: ${TRADING_RESOURCE_HOST_MEMORY:-123g}
      TRADING_RESOURCE_MIN_HEADROOM_CPUS: ${TRADING_RESOURCE_MIN_HEADROOM_CPUS:-6}
      TRADING_RESOURCE_MIN_HEADROOM_MEMORY: ${TRADING_RESOURCE_MIN_HEADROOM_MEMORY:-24g}
      RUNTIME_CPUS: ${RUNTIME_CPUS:-12}
      RUNTIME_MEM_LIMIT: ${RUNTIME_MEM_LIMIT:-48g}
      RUNTIME_MEMSWAP_LIMIT: ${RUNTIME_MEMSWAP_LIMIT:-48g}
      RUNTIME_SHM_SIZE: ${RUNTIME_SHM_SIZE:-8g}
      TIMESCALE_CPUS: ${TIMESCALE_CPUS:-8}
      TIMESCALE_MEM_LIMIT: ${TIMESCALE_MEM_LIMIT:-32g}
      TIMESCALE_MEMSWAP_LIMIT: ${TIMESCALE_MEMSWAP_LIMIT:-32g}
      TIMESCALE_SHM_SIZE: ${TIMESCALE_SHM_SIZE:-2g}
      PREFLIGHT_REQUIRE_DOCKER_POSTGRES_TUNING: ${PREFLIGHT_REQUIRE_DOCKER_POSTGRES_TUNING:-1}
      PREFLIGHT_REQUIRE_DOCKER_RUNTIME_EVIDENCE: ${PREFLIGHT_REQUIRE_DOCKER_RUNTIME_EVIDENCE:-1}
      PREFLIGHT_DOCKER_INSPECT_JSON: ${PREFLIGHT_DOCKER_INSPECT_JSON:-/var/backups/trading/evidence/docker_runtime_inspect.json}
