      operationId: postDataSourceAccountUpdate
      description: |
        Updates the encrypted credential set for one seeded provider account.
        Exact masked values returned by `GET /api/data_sources` are ignored by
        the server rather than persisted as literal credential text. When
        `DASHBOARD_API_TOKEN` is configured, the transport layer requires
        `X-API-Token` on this mutating route. Clearing account credentials uses
        the same `RESET_CREDENTIALS` confirmation policy as source credential
        resets.
      security:
