name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    name: SQLite contract validation (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python dependency locks
        run: python tools/validate_dependency_lock.py --strict

      - name: Run repo artifact hygiene guard
        run: python tools/check_repo_artifact_hygiene.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install locked Python dev/test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements-dev.txt

      - name: Run pre-commit safety hooks on changed files
        run: |
          python -m pip install pre-commit==4.6.0

          base_ref=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event.before }}" != "" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            base_ref="${{ github.event.before }}"
          fi

          if [ "$base_ref" != "" ]; then
            python -m pre_commit run --from-ref "$base_ref" --to-ref "${{ github.sha }}" --show-diff-on-failure
          else
            mapfile -t changed_files < <(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")
            if [ "${#changed_files[@]}" -eq 0 ]; then
              echo "No changed files for pre-commit hooks."
            else
              python -m pre_commit run --files "${changed_files[@]}" --show-diff-on-failure
            fi
          fi
        shell: bash

      - name: Install Node dependencies
        run: npm ci

      - name: Run UI validation lane
        env:
          PYTHONPATH: .
        run: npm run check:ui

      - name: Run Linux SQLite contract tests
        env:
          PYTHONPATH: .
        # This job is intentionally not the production-backend gate.
        # The separate production-backend job below provisions Postgres
        # and Redis and fails if backend-required tests are skipped.
        run: |
          python -m pytest -q \
            tests/test_no_sqlite_in_runtime.py \
            tests/test_no_string_paths.py \
            tests/test_no_loose_blob_writes.py \
            tests/test_no_legacy_secret_paths.py \
            tests/test_platform_defaults.py \
            tests/test_audit_canonical.py \
            tests/test_audit_hashing.py \
            tests/test_secrets_loader.py \
            tests/test_secrets_provider_plaintext.py \
            tests/test_secrets_provider_systemd.py
        shell: bash

      - name: Run ops/server pytest and shell test gate
        env:
          PYTHONPATH: .
        run: |
          set -euo pipefail

          python -m pytest -q -m "not requires_rocm" tests/ops
          python -m pytest -q \
            tests/test_observability_cpu_power_policy.py \
            tests/test_prod_preflight_smoke_contracts.py::ProdPreflightSmokeContractTests::test_cpu_power_policy_gate_fails_closed_on_drift_even_when_not_required \
            tests/test_prod_preflight_smoke_contracts.py::ProdPreflightSmokeContractTests::test_cpu_power_policy_gate_warns_when_policy_unavailable_and_not_required

          mapfile -t ops_shell_tests < <(find tests/ops -maxdepth 1 -type f -name '*.sh' | sort)
          if [ "${#ops_shell_tests[@]}" -eq 0 ]; then
            echo "No tests/ops/*.sh shell tests were discovered" >&2
            exit 1
          fi

          printf 'Discovered %s ops shell test(s)\n' "${#ops_shell_tests[@]}"
          for test_script in "${ops_shell_tests[@]}"; do
            echo "::group::${test_script}"
            bash "${test_script}"
            echo "::endgroup::"
          done
        shell: bash

      - name: Run canonical repository validation with pyright gate
        env:
          PYTHONPATH: .
        run: python tools/validate_repo.py

  rocm-profile:
    name: ROCm profile
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate ROCm dependency profile rejects Python 3.11
        run: |
          set +e
          output="$(TRADING_DEPENDENCY_PROFILE=amd-rocm bash deploy/bin/resolve_python_requirements.sh "$PWD" 2>&1)"
          status="$?"
          set -e
          test "$status" = "65"
          grep -F 'amd_rocm_python_runtime_unsupported' <<<"$output"
          grep -F 'required_python=>=3.12' <<<"$output"

      - name: Install locked CPU test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements-dev.txt

      - name: Run ROCm CPU-fallback and marker-gated tests
        env:
          PYTHONPATH: .
        run: |
          python -m pytest -q -m "not requires_rocm" \
            tests/test_dependency_profiles.py \
            tests/test_runtime_hardware.py \
            tests/ops/test_rocm_acceleration.py \
            tests/test_compose_deployment_assets.py

      - name: Build ROCm runtime image
        run: |
          docker build \
            -f deploy/compose/Dockerfile.runtime \
            --build-arg PYTHON_RUNTIME_IMAGE=rocm/pytorch:rocm7.2.4_ubuntu24.04_py3.12_pytorch_release_2.9.1 \
            --build-arg TRADING_DEPENDENCY_PROFILE=amd-rocm \
            --build-arg TRADING_REQUIREMENTS_FILE=requirements-amd-rocm.txt \
            -t trading-system/runtime:amd-rocm-ci \
            .

  coverage:
    name: Coverage gate (branch, money paths)
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      APP_ENV: test
      ENGINE_MODE: safe
      EXECUTION_MODE: safe
      OPERATOR_MODE: safe
      PROD_LOCK: "0"
      KILL_SWITCH_GLOBAL: "0"
      AUTO_BOOT_DAEMONS: "0"
      AUTO_PIPELINE: "0"
      TS_STORAGE_BACKEND: sqlite
      LIVE_CACHE_BACKEND: memory
      IBKR_ENABLED: "0"
      CCXT_ENABLED: "0"
      POLYGON_WS_ENABLED: "0"
      POLYGON_REST_ENABLED: "0"
      TRADIER_ENABLED: "0"
      ALPACA_ENABLED: "0"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install locked Python dev/test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements-dev.txt

      - name: Run branch coverage gate
        run: python tools/coverage_gate.py run

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-reports
          path: artifacts/coverage/*
          if-no-files-found: warn

  safety-critical-money-path:
    name: Safety-critical money path (SQLite/mocks)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: .
      APP_ENV: test
      ENGINE_MODE: safe
      EXECUTION_MODE: safe
      OPERATOR_MODE: safe
      PROD_LOCK: "0"
      KILL_SWITCH_GLOBAL: "0"
      AUTO_BOOT_DAEMONS: "0"
      AUTO_PIPELINE: "0"
      TS_STORAGE_BACKEND: sqlite
      LIVE_CACHE_BACKEND: memory
      IBKR_ENABLED: "0"
      CCXT_ENABLED: "0"
      POLYGON_WS_ENABLED: "0"
      POLYGON_REST_ENABLED: "0"
      TRADIER_ENABLED: "0"
      ALPACA_ENABLED: "0"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install locked Python dev/test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements-dev.txt

      - name: Run safety-critical money-path suites without skips
        run: |
          python tools/run_required_backend_tests.py \
            --label safety-critical-money-path \
            --junitxml "$RUNNER_TEMP/pytest-safety-critical-money-path.xml" \
            --min-selected 136 \
            --expected-source tests/test_kill_switch_regressions.py \
            --expected-source tests/test_broker_router_dry_run_gates.py \
            --expected-source tests/test_broker_order_idempotency_regressions.py \
            --expected-source tests/test_broker_apply_orders_modes.py \
            --expected-source tests/test_drawdown_fail_closed.py \
            --expected-source tests/test_real_capital_safety_e2e.py \
            --expected-source tests/test_position_reconcile_safety.py \
            --expected-source tests/test_live_prelive_reconcile_policy.py \
            --expected-source tests/test_risk_invariants_property.py \
            -- -q -m "safety_critical" -rs \
              tests/test_kill_switch_regressions.py \
              tests/test_broker_router_dry_run_gates.py \
              tests/test_broker_order_idempotency_regressions.py \
              tests/test_broker_apply_orders_modes.py \
              tests/test_drawdown_fail_closed.py \
              tests/test_real_capital_safety_e2e.py \
              tests/test_position_reconcile_safety.py \
              tests/test_live_prelive_reconcile_policy.py \
              tests/test_risk_invariants_property.py

      - name: Upload safety-critical JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-critical-money-path-junit
          path: ${{ runner.temp }}/pytest-safety-critical-money-path.xml
          if-no-files-found: warn

  production-backend:
    name: Production backend gate (Postgres + Redis)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: trading_ci
          POSTGRES_USER: ts_app
          POSTGRES_PASSWORD: test-app-password # pragma: allowlist secret
        ports:
          - 5432:5432
        options: >-
          --shm-size 1g
          --health-cmd "pg_isready -U ts_app -d trading_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      PYTHONPATH: .
      TS_PRODUCTION_BACKEND_TESTS: "1"
      TS_STORAGE_BACKEND: postgres
      TS_PG_DSN: "host=127.0.0.1 port=5432 user=ts_app dbname=trading_ci password=test-app-password" # pragma: allowlist secret
      TS_PGBOUNCER_TEST_DSN: "host=127.0.0.1 port=6432 user=ts_app dbname=trading_ci password=test-app-password" # pragma: allowlist secret
      TS_PG_DIRECT_TEST_DSN: "host=127.0.0.1 port=5432 user=ts_app dbname=trading_ci password=test-app-password" # pragma: allowlist secret
      TS_PGBOUNCER_ASSERT_POOL_SIZE: "50"
      TS_PG_PASSWORD: test-app-password # pragma: allowlist secret
      TS_PG_SCHEMA_PER_DB_PATH: "1"
      TS_PG_POOL_SIZE: "16"
      TS_PG_POOL_MIN_SIZE: "1"
      TS_PG_POOL_TIMEOUT: "15"
      TS_PG_CONNECT_TIMEOUT: "5"
      TRADING_UNIT_TEST_SCHEMA_FAST: "1"
      TRADING_FAILURE_DIAGNOSTICS_PERSIST: "0"
      TRADING_PG_AUTOINIT_ON_CONNECT: "1"
      TS_REDIS_URL: redis://127.0.0.1:6379/0
      TS_REDIS_CONNECT_TIMEOUT_S: "0.25"
      TS_REDIS_SOCKET_TIMEOUT_S: "0.25"
      TS_REDIS_CIRCUIT_COOLDOWN_S: "600"
      TS_CACHE_REAL_INTEGRATION: "1"
      LIVE_CACHE_BACKEND: redis
      LIVE_CACHE_REDIS_URL: redis://127.0.0.1:6379/0
      APP_ENV: test
      ENGINE_MODE: safe
      EXECUTION_MODE: safe
      OPERATOR_MODE: safe
      PROD_LOCK: "0"
      KILL_SWITCH_GLOBAL: "0"
      AUTO_BOOT_DAEMONS: "0"
      AUTO_PIPELINE: "0"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install locked Python dev/test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements-dev.txt

      - name: Start PgBouncer for backend integration tests
        run: |
          set -euo pipefail
          PGBOUNCER_IMAGE="edoburu/pgbouncer:v1.25.2-p0"

          mkdir -p "$RUNNER_TEMP/pgbouncer"
          printf '"ts_app" "%s"\n' "$TS_PG_PASSWORD" > "$RUNNER_TEMP/pgbouncer/userlist.txt"
          {
            echo "[databases]"
            printf 'trading_ci = host=127.0.0.1 port=5432 dbname=trading_ci user=ts_app password=%s\n' "$TS_PG_PASSWORD"
            echo
            echo "[pgbouncer]"
            echo "listen_addr = 127.0.0.1"
            echo "listen_port = 6432"
            echo "auth_type = plain"
            echo "auth_file = /etc/pgbouncer/userlist.txt"
            echo "pool_mode = transaction"
            echo "default_pool_size = 50"
            echo "min_pool_size = 0"
            echo "reserve_pool_size = 0"
            echo "max_client_conn = 200"
            echo "server_idle_timeout = 60"
            echo "query_wait_timeout = 30"
            echo "server_reset_query = DISCARD ALL"
            echo "server_check_query = SELECT 1"
            echo "server_check_delay = 30"
            echo "ignore_startup_parameters = extra_float_digits,options"
            echo "admin_users = ts_app"
            echo "stats_users = ts_app"
            echo "pidfile = /tmp/pgbouncer.pid"
            echo "logfile = /dev/stdout"
          } > "$RUNNER_TEMP/pgbouncer/pgbouncer.ini"

          docker rm -f trading-ci-pgbouncer >/dev/null 2>&1 || true
          docker run \
            --detach \
            --name trading-ci-pgbouncer \
            --network host \
            --volume "$RUNNER_TEMP/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro" \
            --volume "$RUNNER_TEMP/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro" \
            "$PGBOUNCER_IMAGE"

          if ! python - <<'PY'
          import os
          import time

          import psycopg

          deadline = time.monotonic() + 30
          last_exc: Exception | None = None
          while time.monotonic() < deadline:
              try:
                  with psycopg.connect(os.environ["TS_PGBOUNCER_TEST_DSN"], connect_timeout=2) as con:
                      print("pgbouncer_ready=", con.execute("SELECT 1").fetchone()[0])
                  break
              except Exception as exc:  # pragma: no cover - CI diagnostic path
                  last_exc = exc
                  time.sleep(1)
          else:
              raise SystemExit(f"PgBouncer did not become ready: {last_exc!r}")
          PY
          then
            docker logs trading-ci-pgbouncer || true
            exit 1
          fi

      - name: Verify provisioned Postgres, PgBouncer, and Redis
        run: |
          python - <<'PY'
          import os
          import psycopg
          import redis

          with psycopg.connect(os.environ["TS_PG_DSN"], connect_timeout=5) as con:
              print("postgres_select_1=", con.execute("SELECT 1").fetchone()[0])

          with psycopg.connect(os.environ["TS_PGBOUNCER_TEST_DSN"], connect_timeout=5, prepare_threshold=1) as con:
              print("pgbouncer_select_1=", con.execute("SELECT 1").fetchone()[0])

          client = redis.Redis.from_url(os.environ["TS_REDIS_URL"], socket_connect_timeout=2, socket_timeout=2)
          print("redis_ping=", client.ping())
          PY

      - name: Run all marked production-backend tests without skips
        run: |
          python tools/run_required_backend_tests.py \
            --label marked-production-backend-tests \
            --junitxml "$RUNNER_TEMP/pytest-required-backends.xml" \
            -- -q -m "requires_postgres or requires_redis" -rs

      - name: Run targeted production-path backend tests without skips
        run: |
          python tools/run_required_backend_tests.py \
            --label targeted-production-path-tests \
            --junitxml "$RUNNER_TEMP/pytest-production-targeted.xml" \
            -- -q -rs \
              tests/test_storage_migrator.py \
              tests/test_migrator_lock_release_on_rollback.py \
              tests/test_storage_pg_runtime_regressions.py \
              tests/test_storage_locks_pg.py \
              tests/test_layer5_audit_chain_bypass_detected.py \
              tests/test_live_trading_preflight.py::test_execution_mode_refuses_live_arming_before_initial_kill_switch_hold \
              tests/test_live_trading_preflight.py::test_operator_execution_arm_writes_hash_chain_audit \
              tests/test_runtime_reliability_regressions.py::RuntimeReliabilityRegressionTests::test_execution_mode_respects_caller_transaction_boundaries \
              tests/test_runtime_reliability_regressions.py::RuntimeReliabilityRegressionTests::test_concurrent_order_claims_use_single_idempotency_row \
              tests/test_promotion_guard_fdr.py \
              tests/test_cpcv.py \
              tests/test_model_competition_real_pnl.py \
              tests/test_cache_wrappers_integration.py::test_real_redis_postgres_wrappers_integration \
              tests/test_live_cache.py::LiveCacheTests::test_explicit_redis_live_cache_round_trip

      - name: Run full suite on Postgres and Redis
        env:
          TRADING_UNIT_TEST_SCHEMA_FAST: "0"
        run: |
          python tools/run_required_backend_tests.py \
            --label full-postgres-redis-suite \
            --junitxml "$RUNNER_TEMP/pytest-full-postgres-redis.xml" \
            --min-selected 2400 \
            --allow-skip-message-regex "PySR and Julia are required" \
            --allow-skip-message-regex "requires Python 3\\.12 ROCm runtime image" \
            --allow-skip-message-regex "ROCm torch GPU is unavailable" \
            --allow-skip-message-regex "node executable is not available" \
            --allow-skip-message-regex "node is required" \
            --allow-skip-message-regex "dependency-free fallback" \
            -- -q tests/ -rs

      - name: Stop PgBouncer test container
        if: always()
        run: docker rm -f trading-ci-pgbouncer >/dev/null 2>&1 || true

      - name: Run staging prod-preflight evidence harness
        run: |
          mkdir -p "$RUNNER_TEMP/trading-preflight-data" artifacts/preflight
          {
            echo "STAGING_PREFLIGHT_TARGET_ENV=staging"
            echo "STAGING_PREFLIGHT_TARGET_ID=github-actions-postgres"
            echo "TS_STORAGE_BACKEND=postgres"
            echo "TS_PG_DSN=$TS_PG_DSN"
            echo "TS_PG_PASSWORD=$TS_PG_PASSWORD"
            echo "TS_PG_POOL_SIZE=$TS_PG_POOL_SIZE"
            echo "TS_PG_POOL_MIN_SIZE=$TS_PG_POOL_MIN_SIZE"
            echo "TS_PG_POOL_TIMEOUT=$TS_PG_POOL_TIMEOUT"
            echo "TS_PG_CONNECT_TIMEOUT=$TS_PG_CONNECT_TIMEOUT"
            echo "TS_REDIS_URL=$TS_REDIS_URL"
            echo "LIVE_CACHE_BACKEND=redis"
            echo "LIVE_CACHE_REDIS_URL=$LIVE_CACHE_REDIS_URL"
            echo "APP_ENV=staging"
            echo "ENGINE_MODE=safe"
            echo "EXECUTION_MODE=safe"
            echo "OPERATOR_MODE=safe"
            echo "PROD_LOCK=1"
            echo "ALLOW_TRAINING=0"
            echo "DISABLE_LIVE_EXECUTION=1"
            echo "KILL_SWITCH_GLOBAL=1"
            echo "PREFLIGHT_REQUIRE_REDIS=1"
            echo "PREFLIGHT_REQUIRE_TIMESCALE=0"
            echo "PREFLIGHT_REQUIRE_OBJECT_STORAGE=0"
            echo "PREFLIGHT_REQUIRE_BACKUP_EVIDENCE=0"
            echo "PREFLIGHT_CHECK_OPERATOR_SIDECAR_HTTP=0"
            echo "DASHBOARD_API_TOKEN=github-actions-dashboard-token-1234567890" # pragma: allowlist secret
            echo "OPERATOR_API_TOKEN=github-actions-operator-token-1234567890" # pragma: allowlist secret
            python -c 'import base64, os; print("DATA_SOURCE_MASTER_KEY=" + base64.b64encode(os.urandom(32)).decode("ascii"))'
            echo "DB_PATH=$RUNNER_TEMP/trading-preflight-data"
          } > "$RUNNER_TEMP/staging-prod-preflight.env"

          set +e
          python -m engine.runtime.staging_prod_preflight \
            --env-file "$RUNNER_TEMP/staging-prod-preflight.env" \
            --target-env staging \
            --evidence-dir artifacts/preflight \
            --evidence-label github-actions \
            --timeout-s 180
          preflight_rc=$?
          set -e

          python - <<'PY'
          import glob
          import json
          import sys

          paths = sorted(glob.glob("artifacts/preflight/staging/prod_preflight_*.json"))
          if not paths:
              raise SystemExit("no staging prod-preflight evidence artifact was written")
          path = paths[-1]
          with open(path, encoding="utf-8") as fh:
              payload = json.load(fh)
          summary = {
              "evidence_path": path,
              "process": payload.get("process"),
              "target": payload.get("target"),
              "postgres_target": (payload.get("environment") or {}).get("postgres_target"),
              "guardrails": payload.get("guardrails"),
              "prod_preflight_status": (payload.get("prod_preflight") or {}).get("status"),
              "prod_preflight_production_ready": (payload.get("prod_preflight") or {}).get("production_ready"),
              "db_validation": (payload.get("prod_preflight") or {}).get("db_validation"),
          }
          rendered = json.dumps(summary, sort_keys=True)
          for forbidden in ("test-app-password", "github-actions-dashboard-token", "github-actions-operator-token"):
              if forbidden in rendered:
                  raise SystemExit(f"unredacted secret leaked in evidence summary: {forbidden}")
          print(rendered)
          PY

          if [ "$preflight_rc" -ne 0 ] && [ "$preflight_rc" -ne 2 ]; then
            exit "$preflight_rc"
          fi

      - name: Upload staging prod-preflight evidence
        uses: actions/upload-artifact@v4
        with:
          name: staging-prod-preflight-evidence
          path: artifacts/preflight/staging/*.json
          if-no-files-found: error

      - name: Upload production-backend JUnit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-backend-junit
          path: ${{ runner.temp }}/pytest-*.xml
          if-no-files-found: warn
