x-trading-logging: &trading-logging
  driver: "${DOCKER_LOG_DRIVER:-local}"
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-50m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-5}"

services:
  storage-placement-preflight:
    image: ${APP_RUNTIME_IMAGE:?set APP_RUNTIME_IMAGE}
    container_name: trading-storage-placement-preflight
    restart: "no"
    network_mode: none
    logging: *trading-logging
    read_only: true
    environment:
      ENV: ${APP_ENV:-prod}
      PROD_LOCK: ${PROD_LOCK:-1}
      ENGINE_SUPERVISED: "1"
      PREFLIGHT_REQUIRE_ZFS_STORAGE: ${PREFLIGHT_REQUIRE_ZFS_STORAGE:-1}
      PREFLIGHT_STORAGE_REQUIRE_VISIBLE_HOST_PATHS: ${PREFLIGHT_STORAGE_REQUIRE_VISIBLE_HOST_PATHS:-1}
      TRADING_ZFS_ROOT: ${TRADING_ZFS_ROOT:?set TRADING_ZFS_ROOT to the production ZFS root}
      TRADING_ALLOWED_STORAGE_PREFIXES: ${TRADING_ALLOWED_STORAGE_PREFIXES:-/zpool,/dbpool,/auxpool,/var/backups/trading}
      TRADING_ALLOWED_STORAGE_FS_TYPES: ${TRADING_ALLOWED_STORAGE_FS_TYPES:-zfs}
      TRADING_FORBIDDEN_STORAGE_PREFIXES: ${TRADING_FORBIDDEN_STORAGE_PREFIXES:-/var/lib/docker,/var/lib/containerd}
      TRADING_TIMESCALE_DATA: ${TRADING_TIMESCALE_DATA:?set TRADING_TIMESCALE_DATA to a ZFS-backed host path}
      TRADING_REDIS_DATA: ${TRADING_REDIS_DATA:?set TRADING_REDIS_DATA to a ZFS-backed host path}
      TRADING_MINIO_DATA: ${TRADING_MINIO_DATA:?set TRADING_MINIO_DATA to a ZFS-backed host path}
      TRADING_RUNTIME_DATA: ${TRADING_RUNTIME_DATA:?set TRADING_RUNTIME_DATA to a ZFS-backed host path}
      TRADING_RUNTIME_LOGS: ${TRADING_RUNTIME_LOGS:?set TRADING_RUNTIME_LOGS to a ZFS-backed host path}
      TRADING_ARTIFACT_MIRROR: ${TRADING_ARTIFACT_MIRROR:?set TRADING_ARTIFACT_MIRROR to a ZFS-backed host path}
      TRADING_TRAINING_DATASETS: ${TRADING_TRAINING_DATASETS:?set TRADING_TRAINING_DATASETS to a ZFS-backed host path}
      TRADING_BACKUP_ROOT: ${TRADING_BACKUP_ROOT:?set TRADING_BACKUP_ROOT to the ZFS-backed backup mount}
      TRADING_BACKUP_WAL_DIR: ${TRADING_BACKUP_WAL_DIR:?set TRADING_BACKUP_WAL_DIR to the ZFS-backed backup WAL path}
    volumes:
      - ${TRADING_TIMESCALE_DATA:?set TRADING_TIMESCALE_DATA to a ZFS-backed host path}:${TRADING_TIMESCALE_DATA:?set TRADING_TIMESCALE_DATA to a ZFS-backed host path}:ro
      - ${TRADING_TIMESCALE_DATA:?set TRADING_TIMESCALE_DATA to a ZFS-backed host path}:/var/lib/postgresql/data:ro
      - ${TRADING_REDIS_DATA:?set TRADING_REDIS_DATA to a ZFS-backed host path}:${TRADING_REDIS_DATA:?set TRADING_REDIS_DATA to a ZFS-backed host path}:ro
      - ${TRADING_MINIO_DATA:?set TRADING_MINIO_DATA to a ZFS-backed host path}:${TRADING_MINIO_DATA:?set TRADING_MINIO_DATA to a ZFS-backed host path}:ro
      - ${TRADING_RUNTIME_DATA:?set TRADING_RUNTIME_DATA to a ZFS-backed host path}:${TRADING_RUNTIME_DATA:?set TRADING_RUNTIME_DATA to a ZFS-backed host path}:ro
      - ${TRADING_RUNTIME_DATA:?set TRADING_RUNTIME_DATA to a ZFS-backed host path}:/app/data:ro
      - ${TRADING_RUNTIME_LOGS:?set TRADING_RUNTIME_LOGS to a ZFS-backed host path}:${TRADING_RUNTIME_LOGS:?set TRADING_RUNTIME_LOGS to a ZFS-backed host path}:ro
      - ${TRADING_RUNTIME_LOGS:?set TRADING_RUNTIME_LOGS to a ZFS-backed host path}:/app/logs:ro
      - ${TRADING_ARTIFACT_MIRROR:?set TRADING_ARTIFACT_MIRROR to a ZFS-backed host path}:${TRADING_ARTIFACT_MIRROR:?set TRADING_ARTIFACT_MIRROR to a ZFS-backed host path}:ro
      - ${TRADING_ARTIFACT_MIRROR:?set TRADING_ARTIFACT_MIRROR to a ZFS-backed host path}:/app/artifact_mirror:ro
      - ${TRADING_TRAINING_DATASETS:?set TRADING_TRAINING_DATASETS to a ZFS-backed host path}:${TRADING_TRAINING_DATASETS:?set TRADING_TRAINING_DATASETS to a ZFS-backed host path}:ro
      - ${TRADING_TRAINING_DATASETS:?set TRADING_TRAINING_DATASETS to a ZFS-backed host path}:/app/training_datasets:ro
      - ${TRADING_BACKUP_ROOT:?set TRADING_BACKUP_ROOT to the ZFS-backed backup mount}:${TRADING_BACKUP_ROOT:?set TRADING_BACKUP_ROOT to the ZFS-backed backup mount}:ro
    command:
      - python
      - -m
      - engine.runtime.storage_placement
      - --json

  timescaledb:
    image: ${TIMESCALE_IMAGE:?set TIMESCALE_IMAGE}
    container_name: trading-timescaledb
    restart: unless-stopped
    cpus: ${TIMESCALE_CPUS:-8}
    mem_limit: ${TIMESCALE_MEM_LIMIT:-32g}
    memswap_limit: ${TIMESCALE_MEMSWAP_LIMIT:-32g}
    shm_size: ${TIMESCALE_SHM_SIZE:-2g}
    logging: *trading-logging
    depends_on:
      storage-placement-preflight:
        condition: service_completed_successfully
    environment:
      POSTGRES_DB: ${TIMESCALE_DB:-trading}
      POSTGRES_USER: ${TIMESCALE_USER:-trading}
      POSTGRES_PASSWORD_FILE: /run/secrets/timescale_password
      POSTGRES_INITDB_ARGS: "--data-checksums"
      TS_BACKUP_ROOT: /var/backups/trading
      TS_BACKUP_WAL_DIR: /var/backups/trading/wal
      TS_WAL_ARCHIVE_REQUIRE_MOUNT: "1"
    ports:
      - "${TIMESCALE_DANGEROUS_PUBLIC_BIND_HOST:-127.0.0.1}:${TIMESCALE_PORT:-5432}:5432"
    volumes:
      - ${TRADING_TIMESCALE_DATA:?set TRADING_TIMESCALE_DATA to a ZFS-backed host path}:/var/lib/postgresql/data
      - ${TRADING_BACKUP_ROOT:?set TRADING_BACKUP_ROOT to the ZFS-backed backup mount}:/var/backups/trading
      - ${TRADING_WAL_ARCHIVE_SCRIPT:-../../ops/backup/wal_archive.sh}:/opt/trading/ops/backup/wal_archive.sh:ro
      - ${TRADING_WAL_ARCHIVE_CATCHUP_SCRIPT:-../../ops/backup/wal_archive_catchup.sh}:/opt/trading/ops/backup/wal_archive_catchup.sh:ro
    secrets:
      - timescale_password
    command:
      - postgres
      - -c
      - shared_preload_libraries=timescaledb,pg_stat_statements
      - -c
      - max_connections=${TIMESCALE_MAX_CONNECTIONS:-100}
      - -c
      - shared_buffers=${TIMESCALE_SHARED_BUFFERS:-8GB}
      - -c
      - effective_cache_size=${TIMESCALE_EFFECTIVE_CACHE_SIZE:-22GB}
      - -c
      - work_mem=${TIMESCALE_WORK_MEM:-48MB}
      - -c
      - maintenance_work_mem=${TIMESCALE_MAINTENANCE_WORK_MEM:-2GB}
      - -c
      - autovacuum_work_mem=${TIMESCALE_AUTOVACUUM_WORK_MEM:-512MB}
      - -c
      - wal_buffers=${TIMESCALE_WAL_BUFFERS:-64MB}
      - -c
      - wal_level=replica
      - -c
      - wal_compression=on
      - -c
      - min_wal_size=${TIMESCALE_MIN_WAL_SIZE:-4GB}
      - -c
      - max_wal_size=${TIMESCALE_MAX_WAL_SIZE:-16GB}
      - -c
      - wal_keep_size=${TIMESCALE_WAL_KEEP_SIZE:-1GB}
      - -c
      - max_slot_wal_keep_size=${TIMESCALE_MAX_SLOT_WAL_KEEP_SIZE:-8GB}
      - -c
      - archive_mode=${TIMESCALE_ARCHIVE_MODE:-on}
      - -c
      - archive_command=${TIMESCALE_ARCHIVE_COMMAND:-/opt/trading/ops/backup/wal_archive.sh "%p" "%f"}
      - -c
      - archive_timeout=${TIMESCALE_ARCHIVE_TIMEOUT:-60s}
      - -c
      - checkpoint_timeout=${TIMESCALE_CHECKPOINT_TIMEOUT:-15min}
      - -c
      - checkpoint_completion_target=${TIMESCALE_CHECKPOINT_COMPLETION_TARGET:-0.9}
      - -c
      - max_worker_processes=${TIMESCALE_MAX_WORKER_PROCESSES:-16}
      - -c
      - max_parallel_workers=${TIMESCALE_MAX_PARALLEL_WORKERS:-8}
      - -c
      - max_parallel_workers_per_gather=${TIMESCALE_MAX_PARALLEL_WORKERS_PER_GATHER:-4}
      - -c
      - max_parallel_maintenance_workers=${TIMESCALE_MAX_PARALLEL_MAINTENANCE_WORKERS:-4}
      - -c
      - timescaledb.max_background_workers=${TIMESCALE_TIMESCALEDB_MAX_BACKGROUND_WORKERS:-8}
      - -c
      - autovacuum=${TIMESCALE_AUTOVACUUM:-on}
      - -c
      - autovacuum_max_workers=${TIMESCALE_AUTOVACUUM_MAX_WORKERS:-4}
      - -c
      - autovacuum_naptime=${TIMESCALE_AUTOVACUUM_NAPTIME:-10s}
      - -c
      - autovacuum_vacuum_cost_limit=${TIMESCALE_AUTOVACUUM_VACUUM_COST_LIMIT:-4000}
      - -c
      - autovacuum_vacuum_cost_delay=${TIMESCALE_AUTOVACUUM_VACUUM_COST_DELAY:-2ms}
      - -c
      - random_page_cost=${TIMESCALE_RANDOM_PAGE_COST:-1.1}
      - -c
      - effective_io_concurrency=${TIMESCALE_EFFECTIVE_IO_CONCURRENCY:-200}
      - -c
      - maintenance_io_concurrency=${TIMESCALE_MAINTENANCE_IO_CONCURRENCY:-200}
      - -c
      - track_io_timing=on
      - -c
      - log_checkpoints=on
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - trading-external

  redis:
    image: ${REDIS_IMAGE:?set REDIS_IMAGE}
    container_name: trading-redis
    restart: unless-stopped
    cpus: ${REDIS_CPUS:-2}
    mem_limit: ${REDIS_MEM_LIMIT:-8g}
    memswap_limit: ${REDIS_MEMSWAP_LIMIT:-8g}
    logging: *trading-logging
    command:
      - sh
      - -ec
      - |
        exec redis-server --appendonly yes --requirepass "$$(cat /run/secrets/redis_password)" --maxmemory "${REDIS_MAXMEMORY:-6gb}" --maxmemory-policy "${REDIS_MAXMEMORY_POLICY:-allkeys-lru}"
    ports:
      - "${REDIS_DANGEROUS_PUBLIC_BIND_HOST:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - ${TRADING_REDIS_DATA:?set TRADING_REDIS_DATA to a ZFS-backed host path}:/data
    secrets:
      - redis_password
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$(cat /run/secrets/redis_password)" ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - trading-external

  minio:
    image: ${MINIO_IMAGE:?set MINIO_IMAGE}
    container_name: trading-minio
    restart: unless-stopped
    cpus: ${MINIO_CPUS:-2}
    mem_limit: ${MINIO_MEM_LIMIT:-6g}
    memswap_limit: ${MINIO_MEMSWAP_LIMIT:-6g}
    logging: *trading-logging
    command:
      - server
      - /data
      - --console-address
      - :9001
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    ports:
      - "${MINIO_DANGEROUS_PUBLIC_BIND_HOST:-127.0.0.1}:${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_DANGEROUS_PUBLIC_BIND_HOST:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ${TRADING_MINIO_DATA:?set TRADING_MINIO_DATA to a ZFS-backed host path}:/data
    secrets:
      - minio_root_user
      - minio_root_password
    networks:
      - trading-external

  minio-init:
    image: ${MINIO_CLIENT_IMAGE:?set MINIO_CLIENT_IMAGE}
    container_name: trading-minio-init
    restart: "no"
    logging: *trading-logging
    environment:
      OBJECT_STORE_BUCKET: ${OBJECT_STORE_BUCKET:?set OBJECT_STORE_BUCKET}
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        MINIO_ROOT_USER="$$(cat /run/secrets/minio_root_user)"
        MINIO_ROOT_PASSWORD="$$(cat /run/secrets/minio_root_password)"
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          echo "waiting for minio"
          sleep 2
        done
        mc mb --ignore-existing "local/$${OBJECT_STORE_BUCKET}"
    secrets:
      - minio_root_user
      - minio_root_password
    networks:
      - trading-external

networks:
  trading-external:
    name: trading-external

secrets:
  timescale_password:
    file: ${TIMESCALE_PASSWORD_FILE:?set TIMESCALE_PASSWORD_FILE}
  redis_password:
    file: ${REDIS_PASSWORD_FILE:?set REDIS_PASSWORD_FILE}
  minio_root_user:
    file: ${MINIO_ROOT_USER_FILE:?set MINIO_ROOT_USER_FILE}
  minio_root_password:
    file: ${MINIO_ROOT_PASSWORD_FILE:?set MINIO_ROOT_PASSWORD_FILE}
