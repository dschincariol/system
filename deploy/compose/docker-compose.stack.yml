  operator:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile.operator
      args:
        NODE_RUNTIME_IMAGE: ${NODE_RUNTIME_IMAGE:?set NODE_RUNTIME_IMAGE}
    image: ${APP_OPERATOR_IMAGE:?set APP_OPERATOR_IMAGE}
    container_name: trading-operator
    restart: unless-stopped
    cpus: ${OPERATOR_CPUS:-1}
    mem_limit: ${OPERATOR_MEM_LIMIT:-2g}
    memswap_limit: ${OPERATOR_MEMSWAP_LIMIT:-2g}
    logging: *trading-logging
    environment:
      OPERATOR_BIND_HOST: 0.0.0.0
      OPERATOR_PORT: 4001
      OPERATOR_SIDECAR_INTERNAL_ONLY: "1"
      OPERATOR_DISABLE_INTERNAL_ENGINE_START: "1"
      DASHBOARD_BASE: http://runtime:8000
      DASHBOARD_HOST: runtime
      DASHBOARD_PORT: 8000
      DASHBOARD_API_TOKEN_FILE: /run/secrets/dashboard_api_token
      OPERATOR_API_TOKEN_FILE: /run/secrets/operator_api_token
      OPERATOR_ALLOWED_ORIGIN: ${OPERATOR_ALLOWED_ORIGIN:-http://127.0.0.1:8000}
      TRADING_LOGS: /app/logs
      TRADING_DATA: /app/data
      DB_PATH: ${TRADING_DATA_ROOT:-/app/data}
    expose:
      - "4001"
    volumes:
      - ${TRADING_RUNTIME_DATA:?set TRADING_RUNTIME_DATA to a ZFS-backed host path}:/app/data
      - ${TRADING_RUNTIME_LOGS:?set TRADING_RUNTIME_LOGS to a ZFS-backed host path}:/app/logs
    secrets:
      - dashboard_api_token
      - operator_api_token
    depends_on:
      runtime:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - |
          const http = require("http");
          const fs = require("fs");
          const tokenFile = String(process.env.OPERATOR_API_TOKEN_FILE || "");
          const token = String(process.env.OPERATOR_API_TOKEN || (tokenFile ? fs.readFileSync(tokenFile, "utf8") : "") || "").trim();
          const req = http.get({
            hostname: "127.0.0.1",
            port: 4001,
            path: "/api/operator/status",
            headers: {"X-Operator-Token": token}
          }, (res) => {
            process.exit(res.statusCode && res.statusCode < 500 ? 0 : 1);
          });
          req.on("error", () => process.exit(1));
          req.setTimeout(5000, () => { req.destroy(); process.exit(1); });
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - trading-external

