        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import os, sys, urllib.request
          token = str(os.environ.get("DASHBOARD_API_TOKEN", "") or "").strip()
          token_file = str(os.environ.get("DASHBOARD_API_TOKEN_FILE", "") or "").strip()
          if not token and token_file:
              token = open(token_file, "r", encoding="utf-8").read().strip()
          headers = {"X-API-Token": token} if token else {}
          req = urllib.request.Request("http://127.0.0.1:8000/api/readiness", headers=headers)
          with urllib.request.urlopen(req, timeout=5) as resp:
              sys.exit(0 if int(getattr(resp, "status", 500)) < 500 else 1)
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - trading-external

