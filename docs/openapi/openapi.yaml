                $ref: '#/components/schemas/FreeformObject'
        '401':
          description: Missing, invalid, or disallowed query-string token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/terminal/orders:
    get:
      tags: [terminal]
      summary: Return broker-order state and portfolio-order intents.
      operationId: getTerminalOrders
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 500
            minimum: 1
            maximum: 5000
      responses:
        '200':
          description: Terminal orders payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
  /api/terminal/fills:
    get:
      tags: [terminal]
      summary: Return recent fill rows for the terminal.
      operationId: getTerminalFills
      parameters:
        - name: symbol
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 1000
            minimum: 1
            maximum: 20000
      responses:
        '200':
          description: Terminal fills payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
  /api/terminal/equity:
    get:
      tags: [terminal]
      summary: Return the current account snapshot plus equity history series.
      operationId: getTerminalEquity
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 2000
            minimum: 10
            maximum: 50000
      responses:
        '200':
          description: Terminal equity payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
  /api/terminal/markers:
    get:
      tags: [terminal]
      summary: Return chart markers built from fills and terminal-originated intents.
      operationId: getTerminalMarkers
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Terminal markers payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeformObject'
  /api/terminal/order:
    post:
      tags: [terminal]
      summary: Write a terminal order intent into `portfolio_orders`.
      operationId: postTerminalOrder
      description: |
        This route does not bypass broker logic. It writes a portfolio-order
        intent only when `execution_gate_snapshot()` reports that real trading
        is currently allowed. When `DASHBOARD_API_TOKEN` is configured, the
        transport layer requires `X-API-Token`. Query-string `token` is legacy
        local-development compatibility and is rejected in production/live.

        Manual quantity is not stored in `delta_weight`. Successful requests
        persist neutral weight fields and carry quantity under
        `explain_json.terminal_order`; the execution-intent loader exposes that
        as signed `qty` with `order_sizing = "quantity"`.
      security:
        - DashboardApiToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminalOrderRequest'
      responses:
        '200':
          description: Terminal order acknowledgement or execution-blocked response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalOrderResponse'
        '403':
          description: Mutation auth failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/terminal/flatten:
    post:
      tags: [terminal]
      summary: Write a terminal flatten intent into `portfolio_orders`.
      operationId: postTerminalFlatten
      description: |
        This route reads the current broker position, derives the flatten side
        and quantity, and writes a portfolio-order intent instead of mutating
        positions directly. When `DASHBOARD_API_TOKEN` is configured, the
        transport layer requires `X-API-Token`. Query-string `token` is legacy
        local-development compatibility and is rejected in production/live.

        Flatten uses the same terminal quantity contract as manual orders:
        neutral weight fields in `portfolio_orders`, positive absolute quantity
        and derived signed quantity in `explain_json.terminal_order`, and
        `flatten = true`.
      security:
        - DashboardApiToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminalFlattenRequest'
      responses:
        '200':
          description: Terminal flatten acknowledgement, no-position message, or execution-blocked response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalFlattenResponse'
        '403':
          description: Mutation auth failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
